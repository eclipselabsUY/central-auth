services:
  eclipse-labs-auth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eclipse-labs-auth
    working_dir: /app
    volumes:
      - ./:/app
      - ./pyproject.toml:/app/pyproject.toml
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    restart: "no"
